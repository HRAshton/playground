# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Lint & Test

on:
    workflow_dispatch:

permissions:
    contents: read
    pull-requests: read

jobs:
    build:
        runs-on: ubuntu-latest
        services:
            dynamodb-local:
                image: amazon/dynamodb-local:latest
                entrypoint: sh
                command: >-
                    cd /home/dynamodblocal
                    && java -jar DynamoDBLocal.jar -inMemory -sharedDb
                ports:
                    - 8001:8000
        steps:
            - uses: actions/checkout@v4
            - run: |-
                  curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
                  unzip awscliv2.zip > /dev/null
                  sudo ./aws/install
            - run: aws dynamodb create-table --table-name test-table --attribute-definitions AttributeName=id,AttributeType=S --key-schema AttributeName=id,KeyType=HASH --endpoint-url http://localhost:8001/ --region us-east-1
              env:
                  AWS_ACCESS_KEY_ID: "fake"
                  AWS_SECRET_ACCESS_KEY: "fake"
#      - uses: pnpm/action-setup@v4
#      - run: pnpm install
#      - run: pnpm test:integration
#        env:
#          DYNAMODB_ENDPOINT: 'http://localhost:8001/'
